name: Daily Data Update

on:
  schedule:
    # Run at 04:45 UTC (10:45 AM Bangladesh) — after DGHS morning briefing
    - cron: '45 4 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy openpyxl requests beautifulsoup4 \
                      scipy matplotlib seaborn geopandas papermill nbconvert

      - name: Fetch latest DGHS outbreak data
        run: |
          python scripts/fetch_dghs_update.py && echo "New DGHS data appended." \
            || echo "No new DGHS data (CSV already current or source unavailable)."

      - name: Rebuild consolidated dataset
        run: python scripts/build_dataset.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/dghs_daily_updates.csv
          git add data/processed/measles_bangladesh_consolidated.xlsx
          git add data/processed/update_log.txt
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: auto-update dataset $(date -u '+%Y-%m-%d')"
          git push
