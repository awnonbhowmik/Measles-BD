name: Daily Data Update

on:
  schedule:
    # WHO GHO typically updates on weekdays — run at 06:00 UTC (noon Bangladesh time)
    - cron: '0 6 * * 1-5'
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write             # needed to commit updated data back to repo

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy openpyxl requests scipy matplotlib seaborn geopandas

      - name: Run dataset builder
        run: python scripts/build_dataset.py

      - name: Execute EDA notebook (papermill)
        run: |
          pip install papermill nbconvert
          papermill measles_bangladesh_eda.ipynb measles_bangladesh_eda.ipynb \
            --kernel measles-bd \
            --no-report-mode \
            2>&1 || echo "Notebook execution skipped (kernel not installed in CI)"

      - name: Commit updated data and notebook
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/measles_bangladesh_consolidated.xlsx
          git add data/processed/update_log.txt
          git add measles_bangladesh_eda.ipynb || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: auto-update dataset $(date -u '+%Y-%m-%d')"
          git push
